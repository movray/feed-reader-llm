<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="15">
  <title>NEWS // FEED — LOADING</title>
  <style>
    :root {
      --bg: #020408; --cyan: #00f5ff; --green: #00ff9d;
      --dim: #1a2a3a; --muted: #4a6a7a;
      --scanline: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,245,255,0.015) 2px, rgba(0,245,255,0.015) 4px);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--green);
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: var(--scanline);
      pointer-events: none;
      z-index: 10;
      animation: scan 8s linear infinite;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes scan {
      0%   { background-position: 0 0; }
      100% { background-position: 0 200px; }
    }
    .content { position: relative; z-index: 1; text-align: center; }
    .logo {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 0.15em;
      color: var(--cyan);
      text-shadow: 0 0 20px rgba(0,245,255,0.6);
      animation: flicker 6s infinite;
      margin-bottom: 2.5rem;
    }
    .logo span { color: #ff006e; text-shadow: 0 0 20px rgba(255,0,110,0.6); }
    @keyframes flicker {
      0%,100% { opacity: 1; } 92% { opacity: 1; }
      93% { opacity: 0.4; } 94% { opacity: 1; }
      96% { opacity: 0.7; } 97% { opacity: 1; }
    }
    .msg {
      font-size: 13px;
      letter-spacing: 0.2em;
      color: var(--green);
      text-shadow: 0 0 10px rgba(0,255,157,0.4);
    }
    .blink { animation: blink 1.2s step-end infinite; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    .sub {
      margin-top: 1rem;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--muted);
    }
    .bar {
      width: 240px;
      height: 2px;
      background: var(--dim);
      margin: 1.5rem auto 0;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--green));
      animation: progress 3s ease-in-out infinite;
    }
    @keyframes progress {
      0%   { width: 0%; margin-left: 0; }
      50%  { width: 100%; margin-left: 0; }
      100% { width: 0%; margin-left: 100%; }
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="logo">NEWS<span>//</span>FEED</div>
    <div class="msg">LOADING<span class="blink">_</span> PLEASE WAIT</div>
    <div class="bar"><div class="bar-fill"></div></div>
    <div class="sub">page auto-refreshes every 15 seconds</div>
  </div>
</body>
</html>
