server {
  listen 80;
  error_page 403 404 /loading.html;
  location = /loading.html {
    root /error-pages;
    internal;
  }
  location /api/ {
    proxy_pass http://localhost:5000/api/;
    proxy_set_header Host $host;
  }
  location / {
    root /usr/share/nginx/html;
    index index.html;
  }
}
